<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperCarros RD API</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main {
      max-width: 520px;
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
    p { color: #94a3b8; line-height: 1.6; }
    code {
      background: #0f172a;
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    ul { padding-left: 1.2rem; }
    li { margin: 0.6rem 0; }
    a { color: #38bdf8; }
  </style>
</head>
<body>
  <main>
    <h1>SuperCarros RD API</h1>
    <p>Inventario de Kelvyn Parra Auto Import sincronizado desde SuperCarros.com.</p>
    <ul>
      <li><a href="/api/vehicles">/api/vehicles</a> — JSON completo del inventario</li>
      <li><a href="/api/vehicles?details=0">/api/vehicles?details=0</a> — listado básico</li>
    </ul>
    <p>El frontend personalizado se agregará en el siguiente paso.</p>
  </main>
</body>
</html>
